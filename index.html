<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etch-a-Sketch</title>
    <link rel="stylesheet" href="style.css">
    <script src="jscript.js" defer></script>
</head>
<body>
    <div class="container">
        <div class="title">Etch-a-Sketch</div>
        <div class="drawingField"></div>
        <div class="functionalities">
            <button id="deleteBtn" class="btn">
                <span class="front">Delete</span>
            </button> 
            <button id="randomBtn" class="btn">
                <span class="front">Black</span>
            </button>
            <button id="sizeBtn" class="btn">
                <span class="front">Size</span>
            </button>
        </div>
    </div>
</body>
</html>
